#lightweight instance without NAS for quick file sharing
services:
  nextcloud:
    image: lscr.io/linuxserver/nextcloud:latest
    container_name: nextcloud
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ~/config:/config
      - ~/data:/data
    ports:
      - 8080:80
    restart: unless-stopped

spring:
  security:
    oauth2:
      client:
        registration:
          authentik:
            provider: authentik
            client-id:
            client-secret:
            client-name: authentik
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/{action}/oauth2/code/{registrationId}"
            scope:
              - openid
              - email
              - profile
        provider:
          authentik:
            user-name-attribute: preferred_username
            issuer-uri: https://${Authentik_Host}:9000/application/o/komga/

services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: "https://vaultwarden.homelab.lan" # point to caddy
      SIGNUPS_ALLOWED: "false" #make it true when setting up account
      ADMIN_TOKEN: $ADMINTOKEN # genereate with "openssl rand -base64 48"
    volumes:
      - ./vw-data:/data
    ports:
      - "8080:80" 
